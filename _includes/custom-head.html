<link rel="icon" type="image/x-icon" href="/assets/img/favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicons/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/img/favicons/apple-touch-icon.png">

<style>
/* Applied immediately when embedded class is set by the script below */
html.embedded #topbar-wrapper,
html.embedded #topbar { display: none !important; }
html.embedded #sidebar { display: none !important; }
html.embedded #main-wrapper {
  margin-left: 0 !important;
  padding-top: 0 !important;
  width: 100% !important;
}
html.embedded #core-wrapper {
  max-width: 100% !important;
  padding: 1rem 1.5rem !important;
}
html.embedded .back-to-top { display: none !important; }

/* Fix post-preview hover state persistence inside iframe */
html.embedded .post-preview {
  background-color: transparent !important;
  transition: background-color 0.05s !important;
}
html.embedded .post-preview:hover {
  background-color: rgba(79, 142, 247, 0.06) !important;
}
</style>

<script>
(function () {
  /* Detect embedded mode via URL param (?embedded=1) or persisted sessionStorage */
  var hasParam = /[?&]embedded/.test(location.search);
  var hasSS = false;
  try { hasSS = sessionStorage.getItem('embedded') === '1'; } catch (e) {}
  if (!hasParam && !hasSS) return;

  /* Persist so navigating within the iframe keeps embedded mode */
  try { sessionStorage.setItem('embedded', '1'); } catch (e) {}

  document.documentElement.classList.add('embedded');

  function hide() {
    ['topbar-wrapper', 'topbar', 'sidebar'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    var mw = document.getElementById('main-wrapper');
    if (mw) { mw.style.marginLeft = '0'; mw.style.paddingTop = '0'; mw.style.width = '100%'; }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', hide);
  } else {
    hide();
  }
})();
</script>
